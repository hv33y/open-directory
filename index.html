<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Open Directory Finder — Advanced Media Discovery</title>
    <meta name="title" content="Open Directory Finder — Search Direct Download Links">
    <meta name="description" content="Find direct download links for MKV, MP4, and more. Advanced Google Dorking tool to bypass blogs and find raw server indexes.">
    <meta name="keywords" content="open directory, mkv download, mp4 index, google dorks, index of movies, direct download links">
    <meta name="author" content="hv33y">
    <meta name="robots" content="index, follow">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease; }
        .hidden-dropdown { opacity: 0; transform: translateY(-10px); pointer-events: none; }
        .dropdown-animate { transition: opacity 0.2s ease, transform 0.2s ease; }
        .dropdown-item { width: 100%; text-align: left; padding: 0.5rem 0.75rem; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem; border-radius: 0.75rem; }
        .dropdown-item:hover { background-color: #f4f4f5; }
        .dark .dropdown-item:hover { background-color: #27272a; }
        .dropdown-item-small { width: 100%; text-align: left; padding: 0.5rem 0.75rem; font-size: 0.75rem; font-weight: 600; border-radius: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .dropdown-item-small:hover { background-color: #f4f4f5; }
        .dark .dropdown-item-small:hover { background-color: #27272a; }
    </style>
</head>
<body class="bg-white dark:bg-[#0a0a0a] text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4">

    <header class="text-center mb-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-zinc-100 dark:bg-zinc-900 mb-6 border border-zinc-200 dark:border-zinc-800 shadow-sm">
            <i data-lucide="play-circle" class="w-8 h-8 text-blue-600 dark:text-blue-500"></i>
        </div>
        <h1 class="text-4xl font-bold tracking-tight mb-3">Open Directory Finder</h1>
        <p class="text-zinc-500 dark:text-zinc-400 max-w-md mx-auto text-lg leading-relaxed">
            Targeting raw server indexes. Bypassing blogs and false positives.
        </p>
    </header>

    <main class="w-full max-w-2xl px-4 animate-in fade-in slide-in-from-bottom-6 duration-1000">
        <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl shadow-xl p-2 flex flex-col md:flex-row gap-2">
            
            <div class="relative">
                <button id="typeBtn" onclick="toggleDropdown('typeDropdown')" class="w-full md:w-40 h-12 px-4 flex items-center justify-between text-sm font-medium hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-2xl transition-colors">
                    <span id="currentType" class="truncate flex items-center gap-2">
                        <i data-lucide="film" class="w-4 h-4"></i> TV/Movies
                    </span>
                    <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                </button>

                <div id="typeDropdown" class="hidden-dropdown dropdown-animate absolute top-full left-0 mt-2 w-56 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl z-50 p-2 overflow-hidden">
                    <div class="grid gap-1">
                        <button onclick="setType('mkv|mp4|avi|mov|mpg|wmv', 'TV/Movies', 'video', 'film')" class="dropdown-item">
                            <i data-lucide="film" class="w-4 h-4"></i> TV/Movies
                        </button>
                        <button onclick="setType('epub|pdf|mobi|azw3|cbz', 'Books', 'ebook', 'book')" class="dropdown-item">
                            <i data-lucide="book" class="w-4 h-4"></i> Books
                        </button>
                        <button onclick="setType('mp3|flac|wav|ogg|m4a', 'Music', 'audio', 'music')" class="dropdown-item">
                            <i data-lucide="music" class="w-4 h-4"></i> Music
                        </button>
                        <button onclick="setType('iso|exe|dmg|apk|zip|rar', 'Software', 'archive', 'cpu')" class="dropdown-item">
                            <i data-lucide="cpu" class="w-4 h-4"></i> Software
                        </button>
                        <button onclick="setType('', 'Other', 'all', 'asterisk')" class="dropdown-item">
                            <i data-lucide="asterisk" class="w-4 h-4"></i> Other
                        </button>
                    </div>
                </div>
            </div>

            <div class="hidden md:block w-px bg-zinc-200 dark:border-zinc-800 h-8 self-center"></div>

            <div class="flex-grow">
                <input type="text" id="queryInput" placeholder="Khel Khel Mein..." class="w-full h-12 px-4 bg-transparent focus:outline-none text-lg" onkeydown="if(event.key==='Enter') startSearch()">
            </div>

            <div class="flex items-center gap-2">
                <div class="relative">
                    <button id="engineBtn" onclick="toggleDropdown('engineDropdown')" class="h-10 px-3 flex items-center gap-2 text-xs font-semibold bg-zinc-100 dark:bg-zinc-800 rounded-xl">
                        <span id="currentEngine">Google</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 opacity-50"></i>
                    </button>
                    
                    <div id="engineDropdown" class="hidden-dropdown dropdown-animate absolute top-full right-0 mt-2 w-40 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl z-50 p-2">
                        <div class="grid gap-1">
                            <button onclick="setEngine('google')" class="dropdown-item-small">Google</button>
                            <button onclick="setEngine('filepursuit')" class="dropdown-item-small">FilePursuit</button>
                            <button onclick="setEngine('startpage')" class="dropdown-item-small">Startpage</button>
                        </div>
                    </div>
                </div>

                <button onclick="startSearch()" class="h-12 w-12 md:w-auto md:px-6 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold transition-all shadow-lg active:scale-95">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    <span class="hidden md:block">Find Files</span>
                </button>
            </div>
        </div>

        <div class="mt-6 flex flex-wrap justify-center gap-4 text-xs text-zinc-400 uppercase tracking-widest font-medium">
            <span class="flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3 text-blue-500"></i> Anti-Blog Filter Active</span>
            <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3 text-yellow-500"></i> Server Index Priority</span>
        </div>
    </main>

    <footer class="fixed bottom-8 text-center text-zinc-500 text-sm">
        <p>© 2026 hv33y · Advanced Search Protocol</p>
    </footer>

    <script>
        let currentEngine = 'google';
        let currentTypeData = { extensions: 'mkv|mp4|avi|mov|mpg|wmv', label: 'TV/Movies', resType: 'video', icon: 'film' };

        lucide.createIcons();

        function toggleDropdown(id) {
            document.querySelectorAll('.dropdown-animate').forEach(d => {
                if(d.id !== id) d.classList.add('hidden-dropdown');
            });
            document.getElementById(id).classList.toggle('hidden-dropdown');
        }

        window.onclick = (e) => {
            if (!e.target.closest('#typeBtn') && !e.target.closest('#engineBtn')) {
                document.querySelectorAll('.dropdown-animate').forEach(d => d.classList.add('hidden-dropdown'));
            }
        };

        function setType(ext, lbl, res, icon) {
            currentTypeData = { extensions: ext, label: lbl, resType: res, icon: icon };
            document.getElementById('currentType').innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> ${lbl}`;
            lucide.createIcons();
            document.getElementById('typeDropdown').classList.add('hidden-dropdown');
        }

        function setEngine(eng) {
            currentEngine = eng;
            document.getElementById('currentEngine').innerText = eng.charAt(0).toUpperCase() + eng.slice(1);
            document.getElementById('engineDropdown').classList.add('hidden-dropdown');
        }

        function startSearch() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const { extensions, resType } = currentTypeData;

            // AGGRESSIVE ANTI-BLOG LOGIC
            const excludes = "-inurl:(wordpress|blogspot|tumblr|html|php|aspx|jsp|cf|shtml)";
            const serverTags = '"last modified" "size"';
            const baseDork = `intitle:"index of"`;

            let finalQuery = "";
            if (currentEngine === 'filepursuit') {
                const url = `https://filepursuit.com/search/${query.replace(/ /g,"+")}/type/${resType}`;
                window.open(url, '_blank');
                return;
            }

            // Constructing the Dork
            if (extensions === "") {
                finalQuery = `"${query}" ${baseDork} ${excludes} ${serverTags}`;
            } else {
                finalQuery = `"${query}" +(${extensions}) ${baseDork} ${excludes} ${serverTags}`;
            }

            let url = "";
            switch(currentEngine) {
                case 'google':
                    url = `https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`;
                    break;
                case 'startpage':
                    url = `https://www.startpage.com/do/dsearch?query=${encodeURIComponent(finalQuery)}`;
                    break;
                default:
                    url = `https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`;
            }

            window.open(url, '_blank');
        }
    </script>
</body>
</html>
