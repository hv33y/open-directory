<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Open Directory Finder — Search Direct Download Links</title>
    <meta name="title" content="Open Directory Finder — Search Direct Download Links">
    <meta name="description" content="Find direct download links for movies, books, music, software, and games using advanced Google search dorks. Minimalist and powerful open directory search tool.">
    <meta name="keywords" content="open directory, direct download, google dorks, movie download, ebook search, music index, software archive, index of">
    <meta name="author" content="hv33y">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hv33y.github.io/open-directory/">
    <meta property="og:title" content="Open Directory Finder — Search Direct Download Links">
    <meta property="og:description" content="Find direct download links for movies, books, music, and more using powerful advanced search filters.">
    <meta property="og:image" content="https://hv33y.github.io/open-directory/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Open Directory Finder">
    <meta property="twitter:description" content="Advanced open directory search for direct download links. Minimalist, fast, and secure.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .dropdown-animate {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .hidden-dropdown {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        /* Dark/Light transition */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Custom focus rings */
        .focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="bg-white dark:bg-[#0a0a0a] text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <header class="text-center mb-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-zinc-100 dark:bg-zinc-900 mb-6 border border-zinc-200 dark:border-zinc-800 shadow-sm">
            <i data-lucide="folder-search" class="w-8 h-8 text-blue-600 dark:text-blue-500"></i>
        </div>
        <h1 class="text-4xl font-bold tracking-tight mb-3">Open Directory Finder</h1>
        <p class="text-zinc-500 dark:text-zinc-400 max-w-md mx-auto text-lg leading-relaxed">
            Generate powerful search queries to find direct download links for almost anything.
        </p>
    </header>

    <!-- Main Search UI -->
    <main class="w-full max-w-2xl px-4 animate-in fade-in slide-in-from-bottom-6 duration-1000">
        <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl shadow-xl p-2 flex flex-col md:flex-row gap-2">
            
            <!-- Type Selector -->
            <div class="relative">
                <button id="typeBtn" onclick="toggleDropdown('typeDropdown')" class="w-full md:w-40 h-12 px-4 flex items-center justify-between text-sm font-medium hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-2xl transition-colors">
                    <span id="currentType" class="truncate flex items-center gap-2">
                        <i data-lucide="asterisk" class="w-4 h-4"></i> Other
                    </span>
                    <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                </button>

                <!-- Type Dropdown -->
                <div id="typeDropdown" class="hidden-dropdown dropdown-animate absolute top-full left-0 mt-2 w-56 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl z-50 p-2 overflow-hidden">
                    <div class="grid gap-1">
                        <button onclick="setType('mkv|mp4|avi|mov|mpg|wmv|divx|mpeg', 'TV/Movies', 'video', 'film')" class="dropdown-item">
                            <i data-lucide="film" class="w-4 h-4"></i> TV/Movies
                        </button>
                        <button onclick="setType('MOBI|CBZ|CBR|CBC|CHM|EPUB|FB2|LIT|LRF|ODT|PDF|PRC|PDB|PML|RB|RTF|TCR|DOC|DOCX', 'Books', 'ebook', 'book')" class="dropdown-item">
                            <i data-lucide="book" class="w-4 h-4"></i> Books
                        </button>
                        <button onclick="setType('mp3|wav|ac3|ogg|flac|wma|m4a|aac|mod', 'Music', 'audio', 'music')" class="dropdown-item">
                            <i data-lucide="music" class="w-4 h-4"></i> Music
                        </button>
                        <button onclick="setType('exe|iso|dmg|tar|7z|bz2|gz|rar|zip|apk', 'Software', 'archive', 'cpu')" class="dropdown-item">
                            <i data-lucide="cpu" class="w-4 h-4"></i> Software
                        </button>
                        <button onclick="setType('jpg|png|bmp|gif|tif|tiff|psd', 'Images', 'picture', 'image')" class="dropdown-item">
                            <i data-lucide="image" class="w-4 h-4"></i> Images
                        </button>
                        <button onclick="setType('', 'Other', 'all', 'asterisk')" class="dropdown-item">
                            <i data-lucide="asterisk" class="w-4 h-4"></i> Other
                        </button>
                    </div>
                </div>
            </div>

            <!-- Vertical Divider (Desktop only) -->
            <div class="hidden md:block w-px bg-zinc-200 dark:border-zinc-800 h-8 self-center"></div>

            <!-- Search Input -->
            <div class="flex-grow">
                <input type="text" id="queryInput" placeholder="Enter title or keywords..." class="w-full h-12 px-4 bg-transparent focus:outline-none text-lg" onkeydown="if(event.key==='Enter') startSearch()">
            </div>

            <!-- Engine Selector & Action -->
            <div class="flex items-center gap-2">
                <div class="relative">
                    <button id="engineBtn" onclick="toggleDropdown('engineDropdown')" class="h-10 px-3 flex items-center gap-2 text-xs font-semibold bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-xl transition-all">
                        <span id="currentEngine">Google</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 opacity-50"></i>
                    </button>
                    
                    <div id="engineDropdown" class="hidden-dropdown dropdown-animate absolute top-full right-0 mt-2 w-40 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl z-50 p-2 overflow-hidden">
                        <div class="grid gap-1">
                            <button onclick="setEngine('google')" class="dropdown-item-small">Google</button>
                            <button onclick="setEngine('googol')" class="dropdown-item-small">Googol</button>
                            <button onclick="setEngine('startpage')" class="dropdown-item-small">Startpage</button>
                            <button onclick="setEngine('searx')" class="dropdown-item-small">Searx</button>
                            <button onclick="setEngine('filepursuit')" class="dropdown-item-small">FilePursuit</button>
                        </div>
                    </div>
                </div>

                <button onclick="startSearch()" class="h-12 w-12 md:w-auto md:px-6 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    <span class="hidden md:block">Search</span>
                </button>
            </div>
        </div>

        <!-- Hint Section -->
        <div class="mt-6 flex flex-wrap justify-center gap-4 text-xs text-zinc-400 uppercase tracking-widest font-medium">
            <span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i> Direct Links</span>
            <span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i> No Ads</span>
            <span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i> Fast Access</span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-8 text-center text-zinc-400 text-sm">
        <p>© 2026 Open Directory Finder · Developed by hv33y</p>
    </footer>

    <!-- Scripts -->
    <script>
        // State Management
        let currentEngine = 'google';
        let currentTypeData = {
            extensions: '',
            label: 'Other',
            resType: 'all',
            icon: 'asterisk'
        };

        // Initialize Lucide Icons
        lucide.createIcons();

        // Tailwind Class Helpers for Dropdowns
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'in': 'fadeIn 0.5s ease-out'
                    }
                }
            }
        };

        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const otherId = id === 'typeDropdown' ? 'engineDropdown' : 'typeDropdown';
            document.getElementById(otherId).classList.add('hidden-dropdown');
            dropdown.classList.toggle('hidden-dropdown');
        }

        // Close dropdowns when clicking outside
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#typeBtn') && !e.target.closest('#typeDropdown')) {
                document.getElementById('typeDropdown').classList.add('hidden-dropdown');
            }
            if (!e.target.closest('#engineBtn') && !e.target.closest('#engineDropdown')) {
                document.getElementById('engineDropdown').classList.add('hidden-dropdown');
            }
        });

        function setType(extensions, label, resType, icon) {
            currentTypeData = { extensions, label, resType, icon };
            document.getElementById('currentType').innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> ${label}`;
            lucide.createIcons();
            document.getElementById('typeDropdown').classList.add('hidden-dropdown');
            document.getElementById('queryInput').focus();
        }

        function setEngine(engine) {
            currentEngine = engine;
            document.getElementById('currentEngine').innerText = engine.charAt(0).toUpperCase() + engine.slice(1);
            document.getElementById('engineDropdown').classList.add('hidden-dropdown');
            document.getElementById('queryInput').focus();
        }

        function startSearch() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const { extensions, resType } = currentTypeData;
            let finalQuery = "";

            // Standard Dork Logic from Original App
            const baseExclude = "-inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|index-of|wallywashis|downloadmana)";
            
            if (extensions === "") {
                finalQuery = `${query} ${baseExclude}`;
            } else {
                finalQuery = `${query} +(${extensions}) ${baseExclude}`;
            }

            let url = "";
            switch(currentEngine) {
                case 'google':
                    url = `https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`;
                    break;
                case 'googol':
                    url = `https://googol.warriordudimanche.net/?q=${encodeURIComponent(finalQuery)}`;
                    break;
                case 'startpage':
                    url = `https://www.startpage.com/do/dsearch?query=${encodeURIComponent(finalQuery)}`;
                    break;
                case 'searx':
                    url = `https://searx.me/?q=${encodeURIComponent(finalQuery)}`;
                    break;
                case 'filepursuit':
                    url = `https://filepursuit.com/search/${query.replace(/ /g,"+")}/type/${resType}`;
                    break;
            }

            window.open(url, '_blank');
        }

        // Dropdown Styling via utility classes
        const style = document.createElement('style');
        style.textContent = `
            .dropdown-item {
                @apply w-full text-left px-3 py-2 text-sm flex items-center gap-3 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors font-medium;
            }
            .dropdown-item-small {
                @apply w-full text-left px-3 py-2 text-xs font-semibold rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors uppercase tracking-wider;
            }
            /* Custom Tailwind Injection for generated elements */
            .dropdown-item { width: 100%; text-align: left; padding: 0.5rem 0.75rem; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem; border-radius: 0.75rem; }
            .dropdown-item:hover { background-color: #f4f4f5; }
            .dark .dropdown-item:hover { background-color: #27272a; }

            .dropdown-item-small { width: 100%; text-align: left; padding: 0.5rem 0.75rem; font-size: 0.75rem; font-weight: 600; border-radius: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
            .dropdown-item-small:hover { background-color: #f4f4f5; }
            .dark .dropdown-item-small:hover { background-color: #27272a; }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
